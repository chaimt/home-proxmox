services:
  duplicati:
    image: duplicati/duplicati:2.3.0.0
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_duplicati
    hostname: duplicati
    restart: unless-stopped
    # Recommendation: Duplicati needs root user to get access to all files
    user: "${DOCKER_ROOTPUID:-0}:${DOCKER_ROOTPGID:-0}"
    network_mode: bridge
    ports:
      - 8200:8200
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/duplicati_data:/data:rw
      - ${DOCKER_PATH_PERSISTENT}/duplicati_config/:/config:ro            
      - ${DOCKER_PATH_PERSISTENT}:/source:ro      
    environment:
      - TZ=${DOCKER_TZ}

  diun:
    image: crazymax/diun:4.31.0
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_diun
    command: serve
    volumes:
      - "./data:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: unless-stopped
    environment:
      - "TZ=${DOCKER_TZ}"
      - "DIUN_WATCH_WORKERS=20"
      - "DIUN_WATCH_SCHEDULE=0 */6 * * *"
      - "DIUN_WATCH_JITTER=30s"
      - "DIUN_PROVIDERS_DOCKER=true"
      - "DIUN_NOTIF_TELEGRAM_TOKEN=${BOT_TOKEN}"
      - "DIUN_NOTIF_TELEGRAM_CHATIDS=${CHAT_ID}"
      - "DIUN_NOTIF_TELEGRAM_TEMPLATEBODY=[${DOCKER_CONTAINER_NAME_PREFIX}] {{ .Entry.Image }} has been {{ if (eq .Entry.Status \"new\") }}newly added{{ else }}updated{{ end }}."
    labels:
      - "diun.enable=true"

  dozzle:
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_dozzle
    image: amir20/dozzle:v10.3.3
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 9999:8080



  openbooks:
      image: evanbuss/openbooks
      container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_openbooks
      ports:
        - "8080:8080"
      volumes:
        - ./data:/books
      restart: unless-stopped

  stirling-pdf:
      image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
      container_name: ${DOCKER_CONTAINER_NAME_PREFIX}stirling-pdf
      ports:
        - "8090:8080"
      volumes:
        - ./StirlingPDF/trainingData:/usr/share/tessdata # Required for extra OCR languages
        - ./StirlingPDF/extraConfigs:/configs
        - ./StirlingPDF/customFiles:/customFiles/
        - ./StirlingPDF/logs:/logs/
        - ./StirlingPDF/pipeline:/pipeline/
      restart: unless-stopped


