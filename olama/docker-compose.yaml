services:
  openWebUI:
    image: ghcr.io/open-webui/open-webui:v0.9.5
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_openwebui
    hostname: openwebui
    networks:
      - traefik-net
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./open-webui-local:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`openwebui.domain.com`)"
      - "traefik.http.routers.openwebui.entrypoints=https"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
    environment:
      OLLAMA_BASE_URLS: http://ollama:11434
    ports:
      - 8080:8080

  ollama:
    image: ollama/ollama:0.23.2
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_ollama
    restart: unless-stopped
    hostname: ollama
    networks:
      - traefik-net
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/ollama-local:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_NUM_PARALLEL: 2
    ports:
      - 11434:11434
    healthcheck:
      # Official image is minimal (no curl); ollama CLI talks to the local API.
      test: ["CMD", "/usr/bin/ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
  speaches:
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.1-cpu
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_speaches
    hostname: speaches
    networks:
      - traefik-net
    restart: unless-stopped
    environment:
      PRELOAD_MODELS: '["ivrit-ai/faster-whisper-v2-d4"]'
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/speaches-hf-cache:/home/ubuntu/.cache/huggingface/hub
    ports:
      - 8000:8000
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speaches.rule=Host(`speaches.domain.com`)"
      - "traefik.http.routers.speaches.entrypoints=https"
      - "traefik.http.services.speaches.loadbalancer.server.port=8000"

networks:
  traefik-net:
    external: true
