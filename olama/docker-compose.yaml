services:
  openWebUI:
    image: ghcr.io/open-webui/open-webui:v0.9.5
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_openwebui
    hostname: openwebui
    networks:
      - traefik-net
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./open-webui-local:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`openwebui.domain.com`)"
      - "traefik.http.routers.openwebui.entrypoints=https"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
    environment:
      OLLAMA_BASE_URLS: http://ollama:11434
    ports:
      - 8080:8080

  ollama:
    image: ollama/ollama:0.23.2
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_ollama
    restart: unless-stopped
    hostname: ollama
    networks:
      - traefik-net
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/ollama-local:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_NUM_PARALLEL: 2
    ports:
      - 11434:11434
    healthcheck:
      # Official image is minimal (no curl); ollama CLI talks to the local API.
      test: ["CMD", "/usr/bin/ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
  speaches:
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.1-cpu
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_speaches
    hostname: speaches
    networks:
      - traefik-net
    restart: unless-stopped
    # Run as root so the bind-mount volume (created as root on the host) is writable.
    user: root
    environment:
      # ivrit-ai/faster-whisper-v2-d4 lacks `library_name: ctranslate2` in its HF metadata so
      # speaches' registry filter can't find it — download it directly via huggingface-cli instead.
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_HOME: /home/ubuntu/.cache/huggingface
      PATH: /home/ubuntu/speaches/.venv/bin:/home/ubuntu/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    command: >
      sh -c "huggingface-cli download ivrit-ai/faster-whisper-v2-d4
      && uvicorn --factory speaches.main:create_app"
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/speaches-hf-cache:/home/ubuntu/.cache/huggingface/hub
    ports:
      - 8000:8000
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speaches.rule=Host(`speaches.domain.com`)"
      - "traefik.http.routers.speaches.entrypoints=https"
      - "traefik.http.services.speaches.loadbalancer.server.port=8000"

networks:
  traefik-net:
    external: true
