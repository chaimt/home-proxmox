services:
  openWebUI:
    image: ghcr.io/open-webui/open-webui:v0.9.5
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_openwebui
    hostname: openwebui
    networks:
      - traefik-net
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./open-webui-local:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`openwebui.domain.com`)"
      - "traefik.http.routers.openwebui.entrypoints=https"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
    environment:
      OLLAMA_BASE_URLS: http://ollama:11434
    ports:
      - 8080:8080
      - 11434:11434

  ollama:
    image: ollama/ollama:0.23.2
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_ollama
    restart: unless-stopped
    hostname: ollama
    networks:
      - traefik-net
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/ollama-local:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_NUM_PARALLEL: 2
    healthcheck:
      # Official image is minimal (no curl); ollama CLI talks to the local API.
      test: ["CMD", "/usr/bin/ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
networks:
  traefik-net:
    external: true
