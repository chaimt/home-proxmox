services:
  duplicati:
    image: duplicati/duplicati:2.3.0.1-stable
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_duplicati
    hostname: duplicati
    restart: unless-stopped
    # Recommendation: Duplicati needs root user to get access to all files
    user: "${DOCKER_ROOTPUID:-0}:${DOCKER_ROOTPGID:-0}"
    network_mode: bridge
    ports:
      - 8200:8200
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/duplicati_data:/data:rw
      - ${DOCKER_PATH_PERSISTENT}/duplicati_config/:/config:ro            
      - ${DOCKER_PATH_PERSISTENT}:/source:ro      
    environment:
      - TZ=${DOCKER_TZ}

  diun:
    image: crazymax/diun:4.31.0
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_diun
    command: serve
    volumes:
      - "./data:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: unless-stopped
    environment:
      - "TZ=${DOCKER_TZ}"
      - "DIUN_WATCH_WORKERS=20"
      - "DIUN_WATCH_SCHEDULE=0 */6 * * *"
      - "DIUN_WATCH_JITTER=30s"
      - "DIUN_PROVIDERS_DOCKER=true"
      - "DIUN_NOTIF_TELEGRAM_TOKEN=${BOT_TOKEN}"
      - "DIUN_NOTIF_TELEGRAM_CHATIDS=${CHAT_ID}"
      - "DIUN_NOTIF_TELEGRAM_TEMPLATEBODY=[${DOCKER_CONTAINER_NAME_PREFIX}] {{ .Entry.Image }} has been {{ if (eq .Entry.Status \"new\") }}newly added{{ else }}updated{{ end }}."
    labels:
      - "diun.enable=true"
  dozzle:
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_dozzle
    image: amir20/dozzle:v10.5.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 9999:8080

  netdata:
    image: netdata/netdata:v2.9.0
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_netdata
    hostname: netdata
    pid: host
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - PERFMON
      - NET_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/netdata/config:/etc/netdata
      - ${DOCKER_PATH_PERSISTENT}/netdata/lib:/var/lib/netdata
      - ${DOCKER_PATH_PERSISTENT}/netdata/cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${DOCKER_TZ}
    ports:
      - 19999:19999
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netdata.rule=Host(`netdata.domain.com`)"
      - "traefik.http.routers.netdata.entrypoints=https"
      - "traefik.http.services.netdata.loadbalancer.server.port=19999"

networks:
  traefik-net:
    external: true
