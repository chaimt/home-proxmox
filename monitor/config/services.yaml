# =============================================================================
# Homepage Services Configuration
# =============================================================================
# Host IPs (from Smart Home IP Mapping spreadsheet):
#   MONITOR_HOST   = 10.0.0.98   (MonitorServer)
#   WORKFLOW_HOST  = 10.0.0.99   (Workflow Server)
#   OLLAMA_HOST    = 10.0.0.89   (Ollama)
#   TOOLS_HOST     = 10.0.0.120  (Tools)
#   HEADSCALE_HOST = 10.0.0.104  (Headscale)
#   PKM_HOST       = 10.0.0.108  (SiYuan)
#   WALLABAG_HOST  = 10.0.0.48   (Wallabag)
#   PAIRDROP_HOST  = 10.0.0.109  (PairDrop)
#   MEALIE_HOST    = 10.0.0.97   (Mealie)
#   NAS_HOST       = 10.0.0.100  (TrueNAS)
#   MEDIA_HOST     = 10.0.0.95   (MediaServer)
#   PROXMOX_HOST   = 10.0.0.91   (Proxmox cluster - home1)
# =============================================================================


- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: http://10.0.0.100:30013
        description: Media streaming server
        siteMonitor: http://10.0.0.100:30013
        widget:
          type: jellyfin
          url: http://10.0.0.100:30013
          key: {{HOMEPAGE_VAR_JELLYFIN_API_KEY}}
    - Transmission:
        icon: transmission.png
        href: http://10.0.0.100:30096/transmission/web/
        description: BitTorrent client
        siteMonitor: http://10.0.0.100:30096/transmission/web/
        widget:
          type: transmission
          url: http://10.0.0.100:30096
    - Immich:
        icon: immich.png
        href: http://10.0.0.100:30041
        description: Photo & video management
        siteMonitor: http://10.0.0.100:30041
        widget:
          type: immich
          url: http://10.0.0.100:30041          
          key: {{HOMEPAGE_VAR_IMMICH_API_KEY}}
          version: 2

- Networking:
    - UniFi Controller:
        icon: unifi.png
        href: https://10.0.1.1
        description: Network management
        siteMonitor: https://10.0.1.1
        widget:
          type: unifi
          url: https://10.0.1.1
          key: "{{HOMEPAGE_VAR_UNIFI_API_KEY}}"
    - Speedtest:
        icon: mdi-speedometer
        href: http://10.0.0.98:8765/
        description: Network throughput
        siteMonitor: http://10.0.0.98:8765/
        widget:
          type: speedtest          
          url: http://10.0.0.98:8765/
          version: 2
          key: "{{HOMEPAGE_VAR_SPEEDTEST_TRACKER_API_KEY}}"

- Infrastructure:
    - Proxmox:
        icon: proxmox.png
        href: https://10.0.0.91:8006
        description: Proxmox VE cluster management
        siteMonitor: https://10.0.0.91:8006
        widget:
          type: proxmox
          url: https://10.0.0.91:8006
          version: 2
          username: "{{HOMEPAGE_VAR_PROXMOX_USERNAME}}"
          password: "{{HOMEPAGE_VAR_PROXMOX_PASSWORD}}"

    - HomeAssistant:
        icon: home-assistant.png
        href: http://10.0.0.2:8123/
        description: Home automation
        siteMonitor: http://10.0.0.2:8123/
        proxmoxNode: pve
        proxmoxVMID: 103
        proxmoxType: qemu

    - kuma:
        icon: kuma.png
        href: https://kuma.turel.cloud/dashboard
        description: Monitoring Server
        siteMonitor: http://10.0.0.98:3001/dashboard
        proxmoxNode: pve
        proxmoxVMID: 102
        proxmoxType: lxc

    - TrueNAS:
        icon: truenas.png
        href: https://nas.turel.cloud
        description: Network-attached storage
        siteMonitor: http://10.0.0.100
        widget:
          type: truenas
          url: http://10.0.0.100
          version: 2 # TrueNAS Scale 25.04+ websocket API (default v1 is REST)
          key: "{{HOMEPAGE_VAR_TRUENAS_API_KEY}}"
    - Portainer:
        icon: portainer.png
        href: https://portainer.turel.cloud
        description: Docker management UI
        siteMonitor: http://10.0.0.98:9000
        widget:
          type: portainer
          url: http://10.0.0.98:9000
          env: 2
          key: "{{HOMEPAGE_VAR_PORTAINER_API_KEY}}"
    - n8n:
        icon: n8n.png
        href: http://10.0.0.99:5678
        description: Workflow automation
        siteMonitor: http://10.0.0.99:5678
    - Duplicati:
        icon: duplicati.png
        href: https://n8n.turel.cloud
        description: Backup management
        siteMonitor: http://10.0.0.98:8200
    - NextCloud:
        icon: nextcloud.png
        href: https://nextcloud.turel.cloud
        description: File sync & collaboration
        siteMonitor: https://nextcloud.turel.cloud
        widget:
          type: nextcloud
          url: http://10.0.0.100:30027
          username: {{HOMEPAGE_VAR_NEXTCLOUD_USERNAME}}
          password: {{HOMEPAGE_VAR_NEXTCLOUD_PASSWORD}}

    - Vaultwarden:
        icon: vaultwarden.png
        href: https://pass.turel.cloud/#/login
        description: Password manager
        siteMonitor: https://10.0.0.2:7277

    - Vacumn:
        icon: cloudflare.png
        href: https://vacumn.turel.cloud/
        description: App (Cloudflare Access)
        siteMonitor: http://10.0.0.30
