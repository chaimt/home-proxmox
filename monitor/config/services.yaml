- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: http://10.0.0.100:30013
        description: Media streaming server
        siteMonitor: http://10.0.0.100:30013
        widget:
          type: jellyfin
          url: http://10.0.0.100:30013
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
    - Transmission:
        icon: transmission.png
        href: http://10.0.0.100:30096/transmission/web/
        description: BitTorrent client
        siteMonitor: http://10.0.0.100:30096/transmission/web/
        widget:
          type: transmission
          url: http://10.0.0.100:30096
    - Immich:
        icon: immich.png
        href: https://photos.turel.cloud
        description: Photo & video management
        siteMonitor: http://10.0.0.100:30041
        widget:
          type: immich
          url: http://10.0.0.100:30041          
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
          version: 2
    - Media Portal:
        icon: mdi-play-box-multiple
        href: https://media.turel.cloud
        description: Media portal
        siteMonitor: https://media.turel.cloud

- Entertainment:
    - BookLore:
        icon: mdi-book-multiple
        href: https://books.turel.cloud/dashboard
        description: Self-hosted book library
        siteMonitor: http://10.0.0.100:30260
        widget:
            type: booklore
            url: http://10.0.0.100:30260
            username: "{{HOMEPAGE_VAR_BOOKLORE_USERNAME}}"
            password: "{{HOMEPAGE_VAR_BOOKLORE_PASSWORD}}"

- Networking:
