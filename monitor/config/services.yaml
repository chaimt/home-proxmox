# =============================================================================
# Homepage Services Configuration
# =============================================================================
# Host IPs (from Smart Home IP Mapping spreadsheet):
#   MONITOR_HOST   = 10.0.0.98   (MonitorServer)
#   WORKFLOW_HOST  = 10.0.0.99   (Workflow Server)
#   OLLAMA_HOST    = 10.0.0.89   (Ollama)
#   TOOLS_HOST     = 10.0.0.120  (Tools)
#   HEADSCALE_HOST = 10.0.0.104  (Headscale)
#   PKM_HOST       = 10.0.0.108  (SiYuan)
#   WALLABAG_HOST  = 10.0.0.48   (Wallabag)
#   PAIRDROP_HOST  = 10.0.0.109  (PairDrop)
#   MEALIE_HOST    = 10.0.0.97   (Mealie)
#   NAS_HOST       = 10.0.0.100  (TrueNAS)
#   MEDIA_HOST     = 10.0.0.95   (MediaServer)
#   PROXMOX_HOST   = 10.0.0.91   (Proxmox cluster - home1)
# =============================================================================

- Monitoring:
    - Uptime Kuma:
        icon: uptime-kuma.png
        href: http://10.0.0.98:3001
        description: Service uptime monitoring
        widget:
          type: uptimekuma
          url: http://10.0.0.98:3001
          slug: statuspageslug
    - Dozzle:
        icon: dozzle.png
        href: http://10.0.0.98:9999
        description: Real-time Docker log viewer
    - Pulse:
        icon: mdi-pulse
        href: http://10.0.0.98:7655
        description: Docker container monitoring
    - Glances:
        icon: glances.png
        href: http://10.0.0.98:61208
        description: System monitoring
    - Home Assistant:
        icon: home-assistant.png
        href: http://10.0.0.2:8123
        description: Smart home automation
        widget:
          type: homeassistant
          url: http://10.0.0.2:8123
          key: "{{HOMEASSISTANT_API_TOKEN}}"


- Tools:
    - Stirling PDF:
        icon: stirling-pdf.png
        href: http://10.0.0.120:8090
        description: PDF manipulation tools
    - OpenBooks:
        icon: mdi-book-search
        href: http://10.0.0.120:8080
        description: Book search and download
    - PairDrop:
        icon: pairdrop.png
        href: http://10.0.0.109:3000
        description: Local file sharing
    - Mealie:
        icon: mealie.png
        href: http://10.0.0.97:9000
        description: Recipe management
        widget:
          type: mealie
          url: http://10.0.0.97:9000
          key: MEALIE_API_KEY

- Knowledge & Documents:
    - SiYuan:
        icon: siyuan.png
        href: http://10.0.0.108:6806
        description: Personal knowledge management
    - Wallabag:
        icon: wallabag.png
        href: http://10.0.0.48:8080
        description: Read-it-later / article saving
    - Resilio Sync:
        icon: resilio-sync.png
        href: http://10.0.0.108:8888
        description: File synchronization
    - Paperless-ngx:
        icon: paperless-ngx.png
        href: http://10.0.0.100:30070/dashboard
        description: Document management
    - Booklore:
        icon: mdi-book-open-page-variant
        href: http://10.0.0.100:30260
        description: Book library management
        widget:
          type: booklore
          url: http://10.0.0.100:30260
          username: "{{BOOKLORE_USERNAME}}"
          password: "{{BOOKLORE_PASSWORD}}"

- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: http://10.0.0.100:30013
        description: Media streaming server
        widget:
          type: jellyfin
          url: http://10.0.0.100:30013
          key: "{{JELLYFIN_API_KEY}}"
    - Transmission:
        icon: transmission.png
        href: http://10.0.0.100:30096/transmission/web/
        description: BitTorrent client
        widget:
          type: transmission
          url: http://10.0.0.100:30096
    - Immich:
        icon: immich.png
        href: http://10.0.0.100:30041
        description: Photo & video management
        widget:
          type: immich
          url: http://10.0.0.100:30041
          key: IMMICH_API_KEY

- Networking:
    - UniFi Controller:
        icon: unifi.png
        href: https://UNIFI_HOST:8443
        description: Network management
        widget:
          type: unifi
          url: https://UNIFI_HOST:8443
          username: UNIFI_USERNAME
          password: UNIFI_PASSWORD
    - Speedtest:
        icon: mdi-speedometer
        href: http://speedtest.host.or.ip
        description: Network throughput (LibreSpeed / speedtest tracker)
        widget:
          type: speedtest
          url: http://speedtest.host.or.ip
          version: 1
          key: speedtestapikey
          bitratePrecision: 3

- Infrastructure:
    - Proxmox:
        icon: proxmox.png
        href: https://10.0.0.91:8006
        description: Proxmox VE cluster management
        widget:
          type: proxmox
          url: https://10.0.0.91:8006
          username: PROXMOX_USERNAME
          password: PROXMOX_PASSWORD
    - TrueNAS:
        icon: truenas.png
        href: http://10.0.0.100
        description: Network-attached storage
        widget:
          type: truenas
          url: http://10.0.0.100
          version: 2 # TrueNAS Scale 25.04+ websocket API (default v1 is REST)
          key: "{{TRUENAS_API_KEY}}"
    - Portainer:
        icon: portainer.png
        href: http://10.0.0.98:9000
        description: Docker management UI
        widget:
          type: portainer
          url: http://10.0.0.98:9000
          env: 1
          key: "{{PORTAINER_API_KEY}}"
    - n8n:
        icon: n8n.png
        href: http://10.0.0.99:5678
        description: Workflow automation
    - Duplicati:
        icon: duplicati.png
        href: http://10.0.0.98:8200
        description: Backup management
    - NextCloud:
        icon: nextcloud.png
        href: https://nextcloud.turel.cloud
        description: File sync & collaboration
        widget:
          type: nextcloud
          url: https://nextcloud.turel.cloud
          username: NEXTCLOUD_USERNAME
          password: NEXTCLOUD_PASSWORD
