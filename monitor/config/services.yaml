# =============================================================================
# Homepage Services Configuration
# =============================================================================
# Host IPs (from Smart Home IP Mapping spreadsheet):
#   MONITOR_HOST   = 10.0.0.98   (MonitorServer)
#   WORKFLOW_HOST  = 10.0.0.99   (Workflow Server)
#   OLLAMA_HOST    = 10.0.0.89   (Ollama)
#   TOOLS_HOST     = 10.0.0.120  (Tools)
#   HEADSCALE_HOST = 10.0.0.104  (Headscale)
#   PKM_HOST       = 10.0.0.108  (SiYuan)
#   WALLABAG_HOST  = 10.0.0.48   (Wallabag)
#   PAIRDROP_HOST  = 10.0.0.109  (PairDrop)
#   MEALIE_HOST    = 10.0.0.97   (Mealie)
#   NAS_HOST       = 10.0.0.100  (TrueNAS)
#   MEDIA_HOST     = 10.0.0.95   (MediaServer)
#   PROXMOX_HOST   = 10.0.0.91   (Proxmox cluster - home1)
# =============================================================================


- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: http://10.0.0.100:30013
        description: Media streaming server
        widget:
          type: jellyfin
          url: http://10.0.0.100:30013
          key: {{HOMEPAGE_VAR_JELLYFIN_API_KEY}}
    - Transmission:
        icon: transmission.png
        href: http://10.0.0.100:30096/transmission/web/
        description: BitTorrent client
        widget:
          type: transmission
          url: http://10.0.0.100:30096
    - Immich:
        icon: immich.png
        href: http://10.0.0.100:30041
        description: Photo & video management
        widget:
          type: immich
          url: http://10.0.0.100:30041          
          key: {{HOMEPAGE_VAR_IMMICH_API_KEY}}
          version: 2

- Networking:
    - UniFi Controller:
        icon: unifi.png
        href: https://10.0.1.1
        description: Network management
        widget:
          type: unifi
          url: https://10.0.1.1
          key: "{{HOME_VAR_UNIFI_API_KEY}}"
    # speedtest widget: url must be a self-hosted Speedtest Tracker base URL
    # (alexjustesen/speedtest-tracker or henrywhitaker3/Speedtest-Tracker), not speedtest.net.
    # See https://gethomepage.dev/widgets/services/speedtest-tracker/
    - Speedtest:
        icon: mdi-speedometer
        href: http://10.0.0.98:8765/
        description: Network throughput
        widget:
          type: speedtest
          version: 2
          url: http://10.0.0.98:8765/
          key: "{{HOMEPAGE_VAR_SPEEDTEST_TRACKER_API_KEY}}"

- Infrastructure:
    - Proxmox:
        icon: proxmox.png
        href: https://10.0.0.91:8006
        description: Proxmox VE cluster management
        widget:
          type: proxmox
          url: https://10.0.0.91:8006
          username: {{PROXMOX_USERNAME}}
          password: {{PROXMOX_PASSWORD}}
    - TrueNAS:
        icon: truenas.png
        href: http://10.0.0.100
        description: Network-attached storage
        widget:
          type: truenas
          url: http://10.0.0.100
          version: 2 # TrueNAS Scale 25.04+ websocket API (default v1 is REST)
          key: "{{HOMEPAGE_VAR_TRUENAS_API_KEY}}"
    - Portainer:
        icon: portainer.png
        href: http://10.0.0.98:9000
        description: Docker management UI
        widget:
          type: portainer
          url: http://10.0.0.98:9000
          env: 2
          key: "{{HOME_VAR_PORTAINER_API_KEY}}"
    - n8n:
        icon: n8n.png
        href: http://10.0.0.99:5678
        description: Workflow automation
    - Duplicati:
        icon: duplicati.png
        href: http://10.0.0.98:8200
        description: Backup management
    - NextCloud:
        icon: nextcloud.png
        href: https://nextcloud.turel.cloud
        description: File sync & collaboration
        widget:
          type: nextcloud
          url: https://nextcloud.turel.cloud
          username: {{NEXTCLOUD_USERNAME}}
          password: {{NEXTCLOUD_PASSWORD}}
