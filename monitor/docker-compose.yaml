
volumes:
  pulse_data:
services:
  duplicati:
    image: duplicati/duplicati:2.3.0.1-stable
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_duplicati
    hostname: duplicati
    restart: unless-stopped
    # Recommendation: Duplicati needs root user to get access to all files
    user: "${DOCKER_ROOTPUID:-0}:${DOCKER_ROOTPGID:-0}"
    network_mode: bridge
    ports:
      - 8200:8200
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/duplicati_data:/data:rw
      - ${DOCKER_PATH_PERSISTENT}/duplicati_config/:/config:ro            
      - ${DOCKER_PATH_PERSISTENT}:/source:ro      
    environment:
      - TZ=${DOCKER_TZ}


  diun:
    image: crazymax/diun:4.31.0
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_diun
    command: serve
    volumes:
      - "./data:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: unless-stopped
    environment:
      - "TZ=${DOCKER_TZ}"
      - "DIUN_WATCH_WORKERS=20"
      - "DIUN_WATCH_SCHEDULE=0 */6 * * *"
      - "DIUN_WATCH_JITTER=30s"
      - "DIUN_PROVIDERS_DOCKER=true"
      - "DIUN_NOTIF_TELEGRAM_TOKEN=${BOT_TOKEN}"
      - "DIUN_NOTIF_TELEGRAM_CHATIDS=${CHAT_ID}"
      - "DIUN_NOTIF_TELEGRAM_TEMPLATEBODY=[${DOCKER_CONTAINER_NAME_PREFIX}] {{ .Entry.Image }} has been {{ if (eq .Entry.Status \"new\") }}newly added{{ else }}updated{{ end }}."
    labels:
      - "diun.enable=true"
      
  dozzle:
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_dozzle
    image: amir20/dozzle:v10.5.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 9999:8080

  uptime-kuma:
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_uptime-kuma
    image: louislam/uptime-kuma:2.2.1
    restart: unless-stopped
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/kuma:/app/data
    ports:
      - 3001:3001

  # https://github.com/alexjustesen/speedtest-tracker — image: linuxserver/docker-speedtest-tracker
  # Set SPEEDTEST_TRACKER_APP_KEY (Laravel base64 key, e.g. from docs.speedtest-tracker.dev Docker install).
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:1.13.12
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_speedtest-tracker
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${DOCKER_TZ}
      - DISPLAY_TIMEZONE=${DOCKER_TZ}
      # Required: generate with `echo -n 'base64:'; openssl rand -base64 32` (see docs.speedtest-tracker.dev).
      - APP_KEY=${SPEEDTEST_TRACKER_APP_KEY:?Set SPEEDTEST_TRACKER_APP_KEY in .env - empty APP_KEY causes HTTP 500}
      - APP_URL=${SPEEDTEST_TRACKER_APP_URL:-http://10.0.0.98:8765}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=${SPEEDTEST_TRACKER_SCHEDULE:-0 */6 * * *}
    volumes:
      - ${DOCKER_PATH_PERSISTENT}/speedtest-tracker:/config
    ports:
      - 8765:80

  homepage:
    image: ghcr.io/gethomepage/homepage:v1.12.3
    container_name: ${DOCKER_CONTAINER_NAME_PREFIX}_homepage
    ports:
      - 3000:3000
    volumes:
      - /root/home-proxmox/monitor/config:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock:ro # (optional) For docker integrations
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=10.0.0.98:3000,turel.cloud
      - HOMEPAGE_VAR_BOOKLORE_PASSWORD=${HOMEPAGE_VAR_BOOKLORE_PASSWORD:-${BOOKLORE_PASSWORD}}
      - HOMEPAGE_VAR_BOOKLORE_USERNAME=${HOMEPAGE_VAR_BOOKLORE_USERNAME:-${BOOKLORE_USERNAME}}
      - HOMEPAGE_VAR_HOMEASSISTANT_API_TOKEN=${HOMEASSISTANT_API_TOKEN}
      - HOMEPAGE_VAR_IMMICH_API_KEY=${HOMEPAGE_VAR_IMMICH_API_KEY:-${IMMICH_API_KEY}}
      - HOMEPAGE_VAR_JELLYFIN_API_KEY=${HOMEPAGE_VAR_JELLYFIN_API_KEY:-${JELLYFIN_API_KEY}}
      - HOMEPAGE_VAR_MEALIE_API_KEY=${MEALIE_API_KEY}
      - HOMEPAGE_VAR_NEXTCLOUD_PASSWORD=${HOMEPAGE_VAR_NEXTCLOUD_PASSWORD:-${NEXTCLOUD_PASSWORD}}
      - HOMEPAGE_VAR_NEXTCLOUD_USERNAME=${HOMEPAGE_VAR_NEXTCLOUD_USERNAME:-${NEXTCLOUD_USERNAME}}
      - HOMEPAGE_VAR_PORTAINER_API_KEY=${HOMEPAGE_VAR_PORTAINER_API_KEY:-${PORTAINER_API_KEY}}
      - HOMEPAGE_VAR_PROXMOX_USERNAME=${HOMEPAGE_VAR_PROXMOX_USERNAME:-${PROXMOX_USERNAME}}
      - HOMEPAGE_VAR_PROXMOX_PASSWORD=${HOMEPAGE_VAR_PROXMOX_PASSWORD:-${PROXMOX_PASSWORD}}
      - HOMEPAGE_VAR_TRUENAS_API_KEY=${HOMEPAGE_VAR_TRUENAS_API_KEY:-${TRUENAS_API_KEY}}
      - HOMEPAGE_VAR_SPEEDTEST_TRACKER_API_KEY=${HOMEPAGE_VAR_SPEEDTEST_TRACKER_API_KEY:-${SPEEDTEST_TRACKER_API_KEY}}
      - HOMEPAGE_VAR_ADGUARD_USERNAME=${HOMEPAGE_VAR_ADGUARD_USERNAME:-${ADGUARD_USERNAME}}
      - HOMEPAGE_VAR_ADGUARD_PASSWORD=${HOMEPAGE_VAR_ADGUARD_PASSWORD:-${ADGUARD_PASSWORD}}
      - HOMEPAGE_VAR_GRAFANA_USERNAME=${HOMEPAGE_VAR_GRAFANA_USERNAME:-${GRAFANA_USERNAME}}
      - HOMEPAGE_VAR_GRAFANA_PASSWORD=${HOMEPAGE_VAR_GRAFANA_PASSWORD:-${GRAFANA_PASSWORD}}
      - HOMEPAGE_VAR_HA_USERNAME=${HOMEPAGE_VAR_HA_USERNAME:-${HA_USERNAME}}
      - HOMEPAGE_VAR_HA_PASSWORD=${HOMEPAGE_VAR_HA_PASSWORD:-${HA_PASSWORD}}


